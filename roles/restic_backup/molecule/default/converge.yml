---
- name: Converge
  hosts: all
  become: true
  tasks:
    - name: Install bzip2 (needed to extract restic)
      ansible.builtin.apt:
        name: bzip2
        state: present
        update_cache: true

    - name: Download restic binary
      ansible.builtin.get_url:
        url: https://github.com/restic/restic/releases/download/v0.17.3/restic_0.17.3_linux_amd64.bz2
        dest: /tmp/restic.bz2
        mode: "0644"

    - name: Extract restic binary
      ansible.builtin.shell: bunzip2 -f /tmp/restic.bz2 && chmod 755 /tmp/restic && mv /tmp/restic /usr/local/bin/restic
      args:
        creates: /usr/local/bin/restic

    - name: Create restic env file
      ansible.builtin.copy:
        dest: "{{ restic_env_file }}"
        content: |
          RESTIC_REPOSITORY={{ restic_repo_path }}
          RESTIC_PASSWORD={{ restic_password }}
        mode: "0600"

    - name: Create restic password file
      ansible.builtin.copy:
        dest: "{{ restic_password_file }}"
        content: "{{ restic_password }}"
        mode: "0600"

    - name: Initialize restic repository
      ansible.builtin.command: >
        restic init
        --repo {{ restic_repo_path }}
        --password-file {{ restic_password_file }}
      args:
        creates: "{{ restic_repo_path }}/config"

  roles:
    - role: restic_backup
