---
# roles/common/meta/main.yml

galaxy_info:
  role_name: common
  author: homelab
  description: >
    Baseline configuration for all managed hosts. Currently handles
    passwordless sudo for the Ansible user. Extend with additional
    baseline tasks as needed (motd, sshd config, UFW rules, etc.).
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions:
        - bullseye
        - bookworm
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble

dependencies: []
