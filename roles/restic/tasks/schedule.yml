---
# roles/restic/tasks/schedule.yml

- name: Ensure systemd unit directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/restic-backup.service.d
    state: directory

- name: Deploy Restic systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/restic-backup.service
    content: |
      [Unit]
      Description=Run Restic Backup

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/restic-backup-wrapper.sh
    mode: '0644'

- name: Deploy Restic systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/restic-backup.timer
    content: |
      [Unit]
      Description=Daily Restic backup

      [Timer]
      OnCalendar=daily
      Persistent=true

      [Install]
      WantedBy=timers.target
    mode: '0644'

- name: Enable and start timer
  ansible.builtin.systemd:
    name: restic-backup.timer
    enabled: yes
    state: started
