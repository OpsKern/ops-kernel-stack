---
- name: UPGRADES | Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
  when: hardening_unattended_upgrades_enabled

- name: UPGRADES | Deploy 50unattended-upgrades configuration
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  when: hardening_unattended_upgrades_enabled

- name: UPGRADES | Deploy 20auto-upgrades configuration
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  when: hardening_unattended_upgrades_enabled

- name: UPGRADES | Enable unattended-upgrades service
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started
  when: hardening_unattended_upgrades_enabled
