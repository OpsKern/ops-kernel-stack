---
- name: BANNER | Deploy login banner
  ansible.builtin.template:
    src: issue_net.j2
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"

- name: BANNER | Deploy local login banner
  ansible.builtin.template:
    src: issue_net.j2
    dest: /etc/issue
    owner: root
    group: root
    mode: "0644"
